version: 2
updates:
  - package-ecosystem: gradle
    directory: /
    schedule:
      interval: weekly
    ignore:
      # Lifecycle 2.10+ requires minSdk 23; remove after the API 21 migration.
      - dependency-name: "androidx.lifecycle:*"
        versions:
          - "[2.10.0,)"
      # Kotlin 2.4+ requires AGP 9.1; remove after the AGP migration.
      - dependency-name: "org.jetbrains.kotlin:kotlin-bom"
        versions:
          - "[2.4.0,)"
    groups:
      android-dependencies:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
